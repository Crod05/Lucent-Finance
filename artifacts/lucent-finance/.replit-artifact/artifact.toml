kind = "web"
previewPath = "/"
title = "Lucent Finance"
version = "1.0.0"
id = "artifacts/lucent-finance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24446

[services.development]
run = "pnpm --filter @workspace/lucent-finance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lucent-finance", "run", "build" ]
publicDir = "artifacts/lucent-finance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24446"
BASE_PATH = "/"
